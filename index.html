<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversário do Lucas - 19 Anos</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --moss-green: #4A5D23;
            --dark-moss: #1a2410;
            --gold: #D4AF37;
            --light-gold: #F3E5AB;
            --white: #ffffff;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, #2E3B16 0%, #11180A 100%);
            color: var(--light-gold);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .invitation-card {
            background: rgba(26, 36, 16, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            padding: 50px 30px;
            max-width: 400px;
            width: 85%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 0 20px rgba(74, 93, 35, 0.2);
            animation: fadeIn 1.5s ease-out;
            position: relative;
            overflow: hidden;
        }
        
        /* Decorative Corners */
        .invitation-card::before, .invitation-card::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid var(--gold);
            opacity: 0.6;
            transition: all 0.5s ease;
        }
        .invitation-card::before { 
            top: 15px; 
            left: 15px; 
            border-right: none; 
            border-bottom: none; 
        }
        .invitation-card::after { 
            bottom: 15px; 
            right: 15px; 
            border-left: none; 
            border-top: none; 
        }

        .subtitle {
            font-size: 0.8em;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 15px;
            color: var(--gold);
            font-weight: 300;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4em;
            margin: 0;
            font-weight: 700;
            color: var(--white);
            text-shadow: 2px 4px 8px rgba(0,0,0,0.6);
            letter-spacing: 2px;
        }
        .age {
            font-family: 'Playfair Display', serif;
            font-size: 1.8em;
            font-style: italic;
            margin-top: -15px;
            margin-bottom: 35px;
            color: var(--gold);
        }
        
        .divider {
            width: 50px;
            height: 1px;
            background: var(--gold);
            margin: 0 auto 30px auto;
            opacity: 0.5;
        }

        .details {
            font-size: 1em;
            line-height: 1.8;
            margin-bottom: 35px;
            font-weight: 300;
        }
        .highlight {
            font-weight: 600;
            color: var(--white);
            font-size: 1.3em;
            margin-top: 15px;
        }
        .venue {
            font-family: 'Playfair Display', serif;
            font-size: 1.6em;
            color: var(--gold);
            margin: 5px 0 10px 0;
        }
        
        .pizza-icon {
            font-size: 1.5em;
            margin: 15px 0 5px 0;
            opacity: 0.9;
        }

        .deadline {
            font-size: 0.8em;
            color: #b0b0b0;
            margin-bottom: 30px;
            font-style: italic;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.85em;
            transition: all 0.4s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        .btn-address {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold);
            color: var(--gold);
        }
        .btn-address:hover {
            background: var(--gold);
            color: var(--dark-moss);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transform: scale(1.02);
        }
        .btn-whatsapp {
            background: #1ebc5a;
            border: none;
            color: white;
            box-shadow: 0 4px 15px rgba(30, 188, 90, 0.3);
        }
        .btn-whatsapp:hover {
            background: #25D366;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.6);
            transform: scale(1.02);
        }
        
        /* Entrance Animation */
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>
    <div class="invitation-card">
        <div class="subtitle">Convite Especial</div>
        <h1>Lucas</h1>
        <div class="age">19 Anos</div>
        
        <div class="divider"></div>

        <div class="details">
            Será um prazer celebrar este<br>momento especial com você.
            
            <div class="pizza-icon">🍕</div>
            <div class="venue">Rizzieri Forneria</div>
            <div class="highlight">06 de Agosto • 19h00</div>
        </div>

        <div class="deadline">Gentileza confirmar presença até 01/08</div>

        <div class="buttons">
            <a href="https://share.google/eenWwSf9bPAPxkjaZ" target="_blank" class="btn btn-address">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                Ver Endereço
            </a>
            <a href="https://wa.me/5541995641002?text=Ol%C3%A1%20Lucas%2C%20quero%20confirmar%20minha%20presen%C3%A7a%2C%20ir%C3%A1%20eu..." target="_blank" class="btn btn-whatsapp">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                Confirmar Presença
            </a>
        </div>
    </div>
</body>
</html>
